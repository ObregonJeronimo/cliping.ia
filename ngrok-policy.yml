# Traffic Policy de ngrok para arreglar el CORS del plan free.
# Responde el preflight OPTIONS en el borde (antes del interstitial) y agrega
# el header Access-Control-Allow-Origin a todas las respuestas.
#
# Cómo usarlo:
#   ngrok http 8000 --traffic-policy-file ngrok-policy.yml
# (o pegá este YAML en el dashboard de ngrok: tu dominio -> Traffic Policy)

on_http_request:
  - expressions:
      - "req.method == 'OPTIONS'"
    actions:
      - type: custom-response
        config:
          status_code: 204
          headers:
            access-control-allow-origin: "*"
            access-control-allow-methods: "GET, POST, PUT, DELETE, OPTIONS"
            access-control-allow-headers: "*"
            access-control-max-age: "86400"

on_http_response:
  - actions:
      - type: add-headers
        config:
          headers:
            access-control-allow-origin: "*"
